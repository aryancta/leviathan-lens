<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-label="Leviathan Lens architecture diagram">
  <style>
    .box { fill: #fbf9f4; stroke: #2a2a27; stroke-width: 1.5; }
    .accent { fill: #1a1a18; }
    .dash { stroke-dasharray: 5 4; }
    text { font-family: ui-sans-serif, system-ui, sans-serif; fill: #1a1a18; }
    .title { font-weight: 600; font-size: 14px; }
    .sub { font-size: 11px; fill: #52524c; }
    .arrow { stroke: #1a1a18; stroke-width: 1.5; fill: none; }
  </style>
  <rect width="960" height="420" fill="#f1ece0" />
  <!-- Browser -->
  <rect x="30" y="60" width="220" height="120" rx="10" class="box" />
  <text x="45" y="85" class="title">Browser (Next.js client)</text>
  <text x="45" y="108" class="sub">Paste À Run X-Ray</text>
  <text x="45" y="126" class="sub">localStorage: API keys</text>
  <text x="45" y="144" class="sub">Framer Motion reveal</text>
  <text x="45" y="162" class="sub">shadcn-style UI</text>
  <!-- API route -->
  <rect x="340" y="40" width="260" height="160" rx="10" class="box" />
  <text x="355" y="65" class="title">/api/analyze (Next route)</text>
  <text x="355" y="88" class="sub">Validate + route to engine</text>
  <text x="355" y="106" class="sub">x-user-*-key headers only</text>
  <text x="355" y="124" class="sub">Strict JSON schema + retry</text>
  <text x="355" y="142" class="sub">Span verification (verbatim)</text>
  <text x="355" y="166" class="sub">Never stores letter text</text>
  <!-- Engines -->
  <rect x="700" y="20" width="230" height="60" rx="10" class="box" />
  <text x="712" y="42" class="title">Local sludge engine</text>
  <text x="712" y="60" class="sub">10-tactic taxonomy À deterministic</text>
  <rect x="700" y="100" width="230" height="60" rx="10" class="box" />
  <text x="712" y="122" class="title">Claude Sonnet 4.5</text>
  <text x="712" y="140" class="sub">Primary  structured output</text>
  <rect x="700" y="180" width="230" height="60" rx="10" class="box" />
  <text x="712" y="202" class="title">Gemini 2.5 Flash</text>
  <text x="712" y="220" class="sub">Fallback + multimodal</text>
  <!-- Corpus -->
  <rect x="340" y="230" width="260" height="80" rx="10" class="box" />
  <text x="355" y="255" class="title">Rights corpus (curated)</text>
  <text x="355" y="273" class="sub">5 domains Î jurisdictions</text>
  <text x="355" y="291" class="sub">Statute À deadline À ombudsperson</text>
  <!-- Index -->
  <rect x="30" y="230" width="220" height="80" rx="10" class="box" />
  <text x="45" y="255" class="title">Collective Sludge Index</text>
  <text x="45" y="273" class="sub">Anonymised tactic counts</text>
  <text x="45" y="291" class="sub">Seeded À aggregated only</text>
  <!-- Arrows -->
  <path d="M250 120 L340 120" class="arrow" marker-end="url(#a)" />
  <path d="M600 50 L700 50" class="arrow" marker-end="url(#a)" />
  <path d="M600 120 L700 130" class="arrow" marker-end="url(#a)" />
  <path d="M600 190 L700 210" class="arrow" marker-end="url(#a)" />
  <path d="M470 200 L470 230" class="arrow dash" marker-end="url(#a)" />
  <path d="M250 270 L340 270" class="arrow dash" marker-end="url(#a)" />
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1a1a18" />
    </marker>
  </defs>
  <text x="30" y="380" class="sub">Deploy: Docker (Next standalone) À no persistent store required for MVP À keys are local-only</text>
</svg>
