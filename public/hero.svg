<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Leviathan Lens hero illustration">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf9f4" />
      <stop offset="100%" stop-color="#f1ece0" />
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b4322c" stop-opacity="0" />
      <stop offset="50%" stop-color="#b4322c" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#b4322c" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="#1a1a18" />
  <rect x="120" y="60" width="960" height="380" rx="10" fill="url(#paper)" stroke="#2a2a27" />
  <g font-family="Georgia, serif" fill="#1a1a18">
    <text x="160" y="120" font-size="20" font-style="italic" fill="#6a6a62">Aetna Claims Review</text>
    <text x="160" y="170" font-size="22">We regret to inform you that your claim</text>
    <rect x="160" y="180" width="520" height="28" fill="#b4322c" fill-opacity="0.25" />
    <text x="160" y="200" font-size="22">does not meet our criteria for medical necessity</text>
    <text x="160" y="240" font-size="22">at this time. You must submit a written appeal</text>
    <rect x="160" y="250" width="620" height="28" fill="#c9861f" fill-opacity="0.3" />
    <text x="160" y="270" font-size="22">within thirty (30) calendar days from the date of this letter.</text>
    <rect x="160" y="300" width="360" height="28" fill="#3b4a79" fill-opacity="0.3" />
    <text x="160" y="320" font-size="22">The burden is on you to demonstrate</text>
    <text x="160" y="360" font-size="22">that conservative treatment was unsuccessful.</text>
  </g>
  <g font-family="ui-sans-serif, system-ui" font-size="13" fill="#fbf9f4">
    <rect x="760" y="180" width="200" height="26" rx="13" fill="#b4322c" />
    <text x="775" y="198">Vague Denial Reason</text>
    <rect x="820" y="250" width="160" height="26" rx="13" fill="#c9861f" />
    <text x="835" y="268">Hidden Deadline</text>
    <rect x="540" y="300" width="210" height="26" rx="13" fill="#3b4a79" />
    <text x="555" y="318">Reverse Burden of Proof</text>
  </g>
  <rect x="120" y="190" width="960" height="120" fill="url(#scan)" />
  <g fill="#fbf9f4" font-family="ui-sans-serif, system-ui">
    <text x="160" y="420" font-size="12" letter-spacing="2" fill="#b2b2ac">SLUDGE X-RAY Ę 3 TACTICS DETECTED Ę SCORE 62/100</text>
  </g>
</svg>
